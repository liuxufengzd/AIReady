syntax = "proto3";

package search;

// Application-level status codes for RPC responses
enum StatusCode {
  OK = 0;
  NOT_FOUND = 1;
  INVALID_ARGUMENT = 2;
  INTERNAL = 3;
}

// Search service providing document retrieval and storage capabilities
service SearchService {
  // Query documents from the index using hybrid search (semantic + keyword)
  rpc Query(QueryRequest) returns (QueryResponse);

  // Store documents in the index
  rpc Store(StoreRequest) returns (StoreResponse);
}

// Document message representing a single document with content, file URL, and metadata
message Document {
  string content = 1;
  string file_url = 2;
  map<string, string> metadata = 3;
}

// Query request with search parameters
message QueryRequest {
  string project = 1;
  string query = 2;
  map<string, string> filters = 3;
}

// Wrapper message for a list of strings
message StringList {
  repeated string values = 1;
}

// Query response containing matching chunks and files
message QueryResponse {
  StatusCode status = 1;
  map<string, StringList> file_name_to_chunk_ids = 2;
  string error = 3;
}

// Store request containing documents to be indexed
message StoreRequest {
  string project = 1;
  string source_file_name = 2;
}

// Store response
message StoreResponse {
  StatusCode status = 1;
  string error = 2;
}
