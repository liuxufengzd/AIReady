syntax = "proto3";

package search;

// Application-level status codes for RPC responses
enum StatusCode {
  OK = 0;
  NOT_FOUND = 1;
  INVALID_ARGUMENT = 2;
  INTERNAL = 3;
}

// Search service providing document retrieval, storage, and conversation history management
service SearchService {
  // Query documents from the index using hybrid search (semantic + keyword)
  rpc Query(QueryRequest) returns (QueryResponse);

  // Store documents in the index
  rpc Store(StoreRequest) returns (StoreResponse);

  // Store conversation topic summaries in the vector DB
  rpc StoreConvTopics(StoreConvTopicsRequest) returns (StoreConvTopicsResponse);

  // Semantic search over stored conversation topic summaries for a thread
  rpc QueryConvTopics(QueryConvTopicsRequest) returns (QueryConvTopicsResponse);

  // Delete all conversation topic summaries for a thread
  rpc DeleteConvTopics(DeleteConvTopicsRequest) returns (DeleteConvTopicsResponse);
}

// Document message representing a single document with content, file URL, and metadata
message Document {
  string content = 1;
  string file_url = 2;
  map<string, string> metadata = 3;
}

// Query request with search parameters
message QueryRequest {
  string project = 1;
  string query = 2;
  map<string, string> filters = 3;
}

// A file and its matching chunk IDs
message FileChunks {
  string file_name = 1;
  repeated string chunk_ids = 2;
}

// Query response containing matching chunks and files
message QueryResponse {
  StatusCode status = 1;
  repeated FileChunks results = 2;
  string error = 3;
}

// Store request containing documents to be indexed
message StoreRequest {
  string project = 1;
  string source_file_name = 2;
}

// Store response
message StoreResponse {
  StatusCode status = 1;
  string error = 2;
}

// ---------------------------------------------------------------------------
// Conversation history
// ---------------------------------------------------------------------------

// A single extracted conversation topic summary
message ConvTopic {
  string content   = 1;  // Full topic text: "Topic: <name>\n<detail>"
  string thread_id = 2;
}

// Store conversation topic summaries
message StoreConvTopicsRequest {
  repeated ConvTopic topics = 1;
}

message StoreConvTopicsResponse {
  StatusCode status = 1;
  string error      = 2;
}

// Semantic search over stored conversation topic summaries
message QueryConvTopicsRequest {
  string thread_id = 1;
  string query     = 2;
  int32  top_k     = 3;
}

message QueryConvTopicsResponse {
  StatusCode      status   = 1;
  repeated string contents = 2;  // Matched topic texts, ranked by relevance
  string error             = 3;
}

// Delete all topic summaries for a thread
message DeleteConvTopicsRequest {
  string thread_id = 1;
}

message DeleteConvTopicsResponse {
  StatusCode status = 1;
  string error      = 2;
}
