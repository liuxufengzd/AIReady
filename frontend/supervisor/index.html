<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supervisor Q&amp;A</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset("classic-react", {
      presets: [[Babel.availablePresets["react"], { runtime: "classic" }]],
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.9s linear infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease both; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .stream-cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: #64748b;
      border-radius: 1px;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.9s step-start infinite;
    }

    /* Markdown inside assistant bubbles */
    .md h1 { font-size: 1.25em; font-weight: 700; margin: 0.75em 0 0.35em; }
    .md h2 { font-size: 1.1em; font-weight: 600; margin: 0.7em 0 0.3em; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.2em; }
    .md h3 { font-size: 1em; font-weight: 600; margin: 0.6em 0 0.25em; }
    .md p  { margin: 0.45em 0; line-height: 1.65; }
    .md ul { list-style: disc;    margin: 0.35em 0 0.35em 1.3em; }
    .md ol { list-style: decimal; margin: 0.35em 0 0.35em 1.3em; }
    .md li { margin: 0.18em 0; line-height: 1.55; }
    .md code { background: #f1f5f9; color: #1d4ed8; padding: 0.1em 0.3em; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.82em; }
    .md pre  { background: #0f172a; border-radius: 8px; padding: 0.85em 1em; overflow-x: auto; margin: 0.55em 0; }
    .md pre code { background: none; color: #e2e8f0; padding: 0; }
    .md table { border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 0.875em; }
    .md th, .md td { border: 1px solid #e2e8f0; padding: 0.4em 0.75em; text-align: left; }
    .md th { background: #f8fafc; font-weight: 600; }
    .md blockquote { border-left: 3px solid #94a3b8; padding: 0.25em 0.85em; color: #64748b; background: #f8fafc; border-radius: 0 6px 6px 0; margin: 0.45em 0; }
    .md a { color: #2563eb; text-decoration: underline; }
    .md strong { font-weight: 700; }
    .md em { font-style: italic; }
    .md hr { border: none; border-top: 1px solid #e2e8f0; margin: 0.9em 0; }

    /* Sidebar scrollbar */
    .sidebar-scroll { overflow-y: auto; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    /* Chat area scrollbar */
    .chat-scroll { overflow-y: auto; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    textarea { resize: none; }
    input:focus, textarea:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="classic-react">
    "use strict";
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ═══════════════════════════════════════════════════════════════════════════
    // API helpers
    // ═══════════════════════════════════════════════════════════════════════════

    async function apiFetch(url, options = {}) {
      let resp;
      try {
        resp = await fetch(url, options);
      } catch (e) {
        throw new Error(`Network error: ${e.message}`);
      }
      if (!resp.ok) {
        let detail = "";
        try {
          const j = await resp.json();
          detail = j.detail
            ? (Array.isArray(j.detail) ? JSON.stringify(j.detail, null, 2) : String(j.detail))
            : JSON.stringify(j);
        } catch { detail = await resp.text(); }
        throw new Error(`[${resp.status}] ${detail}`);
      }
      if (resp.status === 204) return null;
      const ct = resp.headers.get("content-type") || "";
      if (ct.includes("application/json")) return resp.json();
      const text = await resp.text();
      try { return JSON.parse(text); } catch { return text; }
    }

    function api(base) {
      const b = base.replace(/\/+$/, "");
      return {
        listThreads:   (project)  => apiFetch(`${b}/threads?project=${encodeURIComponent(project)}`),
        getThread:     (id)       => apiFetch(`${b}/threads/${encodeURIComponent(id)}`),
        deleteThread:  (id)       => apiFetch(`${b}/threads/${encodeURIComponent(id)}`, { method: "DELETE" }),
      };
    }

    /**
     * Async generator that POSTs to /query and yields parsed SSE event objects.
     * Event shapes from the server:
     *   { type: "thread_id", thread_id: "..." }
     *   { type: "chunk",     text: "..." }
     *   { type: "final",     text: "...", title: "..." }
     *   { type: "error",     message: "..." }
     */
    async function* queryStream(base, body, signal) {
      const b = base.replace(/\/+$/, "");
      let resp;
      try {
        resp = await fetch(`${b}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal,
        });
      } catch (e) {
        if (e.name === "AbortError") return;
        throw new Error(`Network error: ${e.message}`);
      }
      if (!resp.ok) {
        let detail = "";
        try {
          const j = await resp.json();
          detail = j.detail
            ? (Array.isArray(j.detail) ? JSON.stringify(j.detail, null, 2) : String(j.detail))
            : JSON.stringify(j);
        } catch { detail = await resp.text(); }
        throw new Error(`[${resp.status}] ${detail}`);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop();               // keep last (possibly incomplete) line
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6).trim();
            if (!raw) continue;
            try { yield JSON.parse(raw); } catch { /* ignore malformed lines */ }
          }
        }
        // Flush any remaining decoder bytes
        buf += decoder.decode();
        if (buf.startsWith("data: ")) {
          const raw = buf.slice(6).trim();
          if (raw) { try { yield JSON.parse(raw); } catch {} }
        }
      } finally {
        reader.releaseLock();
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Primitives
    // ═══════════════════════════════════════════════════════════════════════════

    function Spinner({ size = 20, color = "#fff" }) {
      return (
        <div className="spinner" style={{
          width: size, height: size,
          borderRadius: "50%",
          border: `${Math.max(2, size / 10)}px solid rgba(255,255,255,0.25)`,
          borderTopColor: color,
          flexShrink: 0,
        }} />
      );
    }

    function MdPreview({ text }) {
      const html = useMemo(() => {
        if (!text?.trim()) return "";
        try {
          const raw = marked.parse(text);
          return raw.replace(/<a\s+href=/gi, '<a target="_blank" rel="noopener noreferrer" href=');
        } catch { return `<pre style="white-space:pre-wrap">${text}</pre>`; }
      }, [text]);
      return <div className="md text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: html }} />;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Project Setup Screen
    // ═══════════════════════════════════════════════════════════════════════════

    function ProjectSetup({ onStart }) {
      const [project, setProject] = useState("");
      const [apiBase, setApiBase] = useState("http://localhost:8002");
      const [err, setErr] = useState("");
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const submit = (e) => {
        e.preventDefault();
        const p = project.trim();
        if (!p) { setErr("Please enter a project name."); return; }
        onStart(p, apiBase.trim() || "http://localhost:8002");
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center px-4">
          <div className="w-full max-w-md">
            {/* Logo */}
            <div className="text-center mb-10">
              <div className="w-16 h-16 bg-indigo-600 rounded-2xl grid place-items-center text-white font-black text-2xl shadow-lg shadow-indigo-900 mx-auto mb-4">
                SV
              </div>
              <h1 className="text-3xl font-bold text-white tracking-tight">Supervisor Q&amp;A</h1>
              <p className="text-slate-400 mt-2 text-sm">AI-powered document knowledge base</p>
            </div>

            <div className="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-2xl">
              <h2 className="text-lg font-semibold text-white mb-1">Start a conversation</h2>
              <p className="text-slate-400 text-sm mb-6">Enter your project name to begin querying the knowledge base.</p>

              {err && (
                <div className="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-300 text-sm">
                  {err}
                </div>
              )}

              <form onSubmit={submit} className="space-y-4">
                <div>
                  <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                    Project Name
                  </label>
                  <input
                    ref={inputRef}
                    type="text"
                    value={project}
                    onChange={(e) => { setProject(e.target.value); setErr(""); }}
                    onKeyDown={(e) => { if (e.key === "Enter") submit(e); }}
                    placeholder="e.g. machine-reports-2025"
                    className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-500 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                  />
                </div>

                <details className="group">
                  <summary className="text-xs text-slate-500 cursor-pointer hover:text-slate-300 transition-colors select-none list-none flex items-center gap-1">
                    <span className="group-open:hidden">▸</span>
                    <span className="hidden group-open:inline">▾</span>
                    Advanced settings
                  </summary>
                  <div className="mt-3">
                    <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                      API Base URL
                    </label>
                    <input
                      type="text"
                      value={apiBase}
                      onChange={(e) => setApiBase(e.target.value)}
                      className="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-500 text-xs font-mono focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                    />
                  </div>
                </details>

                <button
                  type="submit"
                  className="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[0.99] text-white font-bold rounded-xl transition-all text-sm shadow shadow-indigo-900 mt-2"
                >
                  Open Project →
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Sidebar
    // ═══════════════════════════════════════════════════════════════════════════

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / 86400000);
      if (diffDays === 0) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      if (diffDays === 1) return "Yesterday";
      if (diffDays < 7)  return d.toLocaleDateString([], { weekday: "short" });
      return d.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function Sidebar({ project, threads, currentThreadId, onSelectThread, onNewThread, onDeleteThread, onChangeProject, loading }) {
      return (
        <aside className="flex flex-col bg-slate-900 border-r border-slate-800" style={{ width: 260, minWidth: 260 }}>
          {/* Project header */}
          <div className="px-4 py-4 border-b border-slate-800 flex items-center justify-between gap-2">
            <div className="flex items-center gap-2.5 min-w-0">
              <div className="w-7 h-7 bg-indigo-600 rounded-lg grid place-items-center text-white font-black text-[10px] flex-shrink-0 shadow shadow-indigo-900">
                SV
              </div>
              <div className="min-w-0">
                <p className="text-xs text-slate-500 font-medium">Project</p>
                <p className="text-sm font-bold text-white truncate" title={project}>{project}</p>
              </div>
            </div>
            <button
              onClick={onChangeProject}
              title="Switch project"
              className="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white transition-colors flex items-center justify-center text-xs"
            >
              ↩
            </button>
          </div>

          {/* New thread button */}
          <div className="px-3 py-3">
            <button
              onClick={onNewThread}
              className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold transition-colors"
            >
              <span className="text-base leading-none">+</span>
              New Conversation
            </button>
          </div>

          {/* Thread list */}
          <div className="flex-1 sidebar-scroll px-2 pb-4">
            {loading && threads.length === 0 && (
              <div className="flex items-center justify-center py-10">
                <Spinner size={22} color="#6366f1" />
              </div>
            )}
            {!loading && threads.length === 0 && (
              <p className="text-center text-slate-600 text-xs py-8 px-2">
                No conversations yet.<br />Ask a question to start one.
              </p>
            )}
            {threads.length > 0 && (
              <div className="space-y-0.5">
                {threads.map((t) => {
                  const active = t.thread_id === currentThreadId;
                  return (
                    <div key={t.thread_id} className={`group flex items-center rounded-xl transition-colors ${active ? "bg-slate-700" : "hover:bg-slate-800"}`}>
                      <button
                        className="flex-1 px-3 py-2.5 text-left min-w-0"
                        onClick={() => onSelectThread(t.thread_id)}
                      >
                        <p className={`text-sm truncate leading-snug ${active ? "text-white font-semibold" : "text-slate-300"}`}>
                          {t.title || "Untitled conversation"}
                        </p>
                        <p className="text-[11px] text-slate-500 mt-0.5">{formatDate(t.updated_at)}</p>
                      </button>
                      <button
                        onClick={(e) => { e.stopPropagation(); onDeleteThread(t.thread_id); }}
                        title="Delete"
                        className="flex-shrink-0 opacity-0 group-hover:opacity-100 w-7 h-7 mr-1.5 rounded-lg hover:bg-red-500/20 text-slate-500 hover:text-red-400 flex items-center justify-center text-xs transition-all"
                      >
                        ✕
                      </button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </aside>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Message bubbles
    // ═══════════════════════════════════════════════════════════════════════════

    function UserMessage({ text }) {
      return (
        <div className="flex justify-end">
          <div
            className="max-w-[72%] px-4 py-3 bg-indigo-600 text-white rounded-2xl rounded-br-sm text-sm leading-relaxed whitespace-pre-wrap shadow-sm"
          >
            {text}
          </div>
        </div>
      );
    }

    function AssistantMessage({ text, isStreaming }) {
      const hasText = text && text.trim().length > 0;
      return (
        <div className="flex gap-3">
          <div className="w-7 h-7 bg-emerald-600 rounded-lg flex-shrink-0 grid place-items-center text-white text-xs font-bold mt-0.5 shadow-sm">
            AI
          </div>
          <div className="flex-1 min-w-0 px-4 py-3 bg-white border border-slate-200 rounded-2xl rounded-tl-sm shadow-sm">
            {isStreaming && !hasText ? (
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Spinner size={16} color="#94a3b8" />
                <span>Thinking…</span>
              </div>
            ) : hasText ? (
              <div className="relative">
                <MdPreview text={text} />
                {isStreaming && <span className="stream-cursor" />}
              </div>
            ) : (
              <MdPreview text={text} />
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Chat Input
    // ═══════════════════════════════════════════════════════════════════════════

    function ChatInput({ onSend, loading, disabled }) {
      const [text, setText] = useState("");
      const textareaRef = useRef(null);

      useEffect(() => {
        if (!loading) textareaRef.current?.focus();
      }, [loading]);

      // Auto-grow textarea
      useEffect(() => {
        const el = textareaRef.current;
        if (!el) return;
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 200) + "px";
      }, [text]);

      const submit = () => {
        const q = text.trim();
        if (!q || loading || disabled) return;
        onSend(q);
        setText("");
        if (textareaRef.current) { textareaRef.current.style.height = "auto"; }
      };

      const onKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          submit();
        }
      };

      return (
        <div className="px-4 pb-5 pt-3 bg-white border-t border-slate-200">
          <div className={`flex items-end gap-3 px-4 py-3 border rounded-2xl transition-all ${disabled ? "bg-slate-50 border-slate-200" : "bg-white border-slate-300 focus-within:border-indigo-400 focus-within:ring-2 focus-within:ring-indigo-100"}`}>
            <textarea
              ref={textareaRef}
              value={text}
              onChange={(e) => setText(e.target.value)}
              onKeyDown={onKeyDown}
              placeholder={disabled ? "Select or start a conversation…" : "Ask a question… (Enter to send, Shift+Enter for newline)"}
              rows={1}
              disabled={disabled || loading}
              className="flex-1 bg-transparent text-sm text-slate-800 placeholder-slate-400 leading-relaxed disabled:cursor-not-allowed"
              style={{ maxHeight: 200, overflowY: "auto" }}
            />
            <button
              onClick={submit}
              disabled={!text.trim() || loading || disabled}
              className={`flex-shrink-0 w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm transition-all ${
                !text.trim() || loading || disabled
                  ? "bg-slate-100 text-slate-400 cursor-not-allowed"
                  : "bg-indigo-600 hover:bg-indigo-500 text-white shadow shadow-indigo-200"
              }`}
            >
              {loading ? <Spinner size={16} color="#a5b4fc" /> : "↑"}
            </button>
          </div>
          <p className="text-center text-[11px] text-slate-400 mt-2">
            Supervisor may make mistakes. Verify important information.
          </p>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Chat View
    // ═══════════════════════════════════════════════════════════════════════════

    function ChatView({ thread, pendingQuery, streamingText, onSend, loading, project }) {
      const bottomRef = useRef(null);

      // Scroll to bottom when messages change, loading starts, or new tokens arrive
      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [thread?.body?.length, pendingQuery, streamingText]);

      const isEmpty = !thread || thread.body.length === 0;
      const noThread = !thread && !pendingQuery;

      return (
        <div className="flex-1 flex flex-col min-h-0 bg-slate-50">
          {/* Thread header */}
          {thread && (
            <div className="px-6 py-4 bg-white border-b border-slate-200 flex-shrink-0">
              <p className="text-base font-bold text-slate-800 truncate">
                {thread.title || "New Conversation"}
              </p>
              <p className="text-xs text-slate-400 mt-0.5">
                <span className="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-slate-500">{project}</span>
                {thread.body.length > 0 && (
                  <span className="ml-2">{thread.body.length} {thread.body.length === 1 ? "exchange" : "exchanges"}</span>
                )}
              </p>
            </div>
          )}

          {/* Messages */}
          <div className="flex-1 chat-scroll px-4 py-6">
            <div className="max-w-3xl mx-auto space-y-6">
              {noThread && (
                <div className="text-center py-20">
                  <div className="w-14 h-14 bg-indigo-100 rounded-2xl grid place-items-center text-indigo-600 text-2xl mx-auto mb-4">
                    💬
                  </div>
                  <h3 className="text-lg font-bold text-slate-700 mb-2">Start a conversation</h3>
                  <p className="text-sm text-slate-400">Ask a question below or select a thread from the sidebar.</p>
                </div>
              )}

              {isEmpty && thread && !pendingQuery && (
                <div className="text-center py-16">
                  <p className="text-slate-400 text-sm">This conversation is empty. Ask a question to begin.</p>
                </div>
              )}

              {thread?.body.map((qa, i) => (
                <div key={i} className="space-y-3 fade-up">
                  <UserMessage text={qa.query} />
                  <AssistantMessage text={qa.answer} />
                </div>
              ))}

              {/* Pending (in-flight) message */}
              {pendingQuery && (
                <div className="space-y-3 fade-up">
                  <UserMessage text={pendingQuery} />
                  <AssistantMessage text={streamingText} isStreaming={loading} />
                </div>
              )}

              <div ref={bottomRef} />
            </div>
          </div>

          {/* Input */}
          <ChatInput onSend={onSend} loading={loading} disabled={false} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Root App
    // ═══════════════════════════════════════════════════════════════════════════

    function App() {
      const [project,       setProject]       = useState(null);  // null = setup screen
      const [apiBase,       setApiBase]        = useState("http://localhost:8002");
      const [threads,       setThreads]        = useState([]);
      const [threadsLoading,setThreadsLoading] = useState(false);
      const [currentThread, setCurrentThread]  = useState(null);  // full Thread object
      const [currentId,     setCurrentId]      = useState(null);
      const [pendingQuery,  setPendingQuery]   = useState(null);
      const [streamingText, setStreamingText]  = useState("");
      const [loading,       setLoading]        = useState(false);
      const [error,         setError]          = useState("");
      const abortRef = useRef(null);

      const client = useMemo(() => api(apiBase), [apiBase]);

      // ── Load threads list ──
      const loadThreads = useCallback(async (proj) => {
        setThreadsLoading(true);
        try {
          const list = await client.listThreads(proj);
          setThreads(list);
        } catch (e) {
          setError(`Failed to load threads: ${e.message}`);
        } finally {
          setThreadsLoading(false);
        }
      }, [client]);

      // ── Select thread ──
      const selectThread = useCallback(async (id) => {
        if (id === currentId) return;
        setCurrentId(id);
        setCurrentThread(null);
        setPendingQuery(null);
        try {
          const t = await client.getThread(id);
          setCurrentThread(t);
        } catch (e) {
          setError(`Failed to load thread: ${e.message}`);
        }
      }, [client, currentId]);

      // ── New thread ──
      const startNewThread = () => {
        abortRef.current?.abort();
        setCurrentId(null);
        setCurrentThread(null);
        setPendingQuery(null);
        setStreamingText("");
        setLoading(false);
      };

      // ── Delete thread ──
      const deleteThread = async (id) => {
        try {
          await client.deleteThread(id);
          setThreads((prev) => prev.filter((t) => t.thread_id !== id));
          if (id === currentId) startNewThread();
        } catch (e) {
          setError(`Failed to delete thread: ${e.message}`);
        }
      };

      // ── Send query ──
      const sendQuery = useCallback(async (queryText) => {
        // Cancel any in-flight request
        abortRef.current?.abort();
        const controller = new AbortController();
        abortRef.current = controller;

        setError("");
        setLoading(true);
        setPendingQuery(queryText);
        setStreamingText("");

        // If no thread selected yet, create a temporary placeholder
        if (!currentThread) {
          setCurrentThread({ thread_id: null, project, title: null, body: [] });
        }

        // Track the thread ID resolved from the first SSE event (may differ from currentId
        // when starting a new thread) using a local variable so we don't depend on stale state.
        let resolvedThreadId = currentId;

        try {
          for await (const event of queryStream(apiBase, {
            project,
            query: queryText,
            thread_id: currentId || undefined,
          }, controller.signal)) {
            if (event.type === "thread_id") {
              resolvedThreadId = event.thread_id;
              setCurrentId(event.thread_id);

            } else if (event.type === "chunk") {
              setStreamingText((prev) => prev + event.text);

            } else if (event.type === "final") {
              const newPair = { query: queryText, answer: event.text, tokens: 0 };
              setCurrentThread((prev) => {
                const body = prev ? [...prev.body, newPair] : [newPair];
                return {
                  thread_id: resolvedThreadId,
                  project,
                  title: event.title || prev?.title,
                  body,
                };
              });
              setCurrentId(resolvedThreadId);
              setPendingQuery(null);
              setStreamingText("");
              // Refresh sidebar thread list
              await loadThreads(project);

            } else if (event.type === "error") {
              throw new Error(event.message);
            }
          }
        } catch (e) {
          if (e.name === "AbortError") return;
          setError(`Query failed: ${e.message}`);
          setPendingQuery(null);
          setStreamingText("");
          // Roll back placeholder if thread was new
          if (!currentId) {
            setCurrentThread(null);
          }
        } finally {
          setLoading(false);
        }
      }, [apiBase, project, currentId, currentThread, loadThreads]);

      // ── Project start ──
      const handleStart = (proj, base) => {
        abortRef.current?.abort();
        setApiBase(base);
        setProject(proj);
        setThreads([]);
        setCurrentThread(null);
        setCurrentId(null);
        setPendingQuery(null);
        setStreamingText("");
        setLoading(false);
      };

      // Load threads when project is set (and apiBase is ready)
      useEffect(() => {
        if (project) loadThreads(project);
      }, [project]); // eslint-disable-line

      // ── Setup screen ──
      if (!project) {
        return <ProjectSetup onStart={handleStart} />;
      }

      // ── Main layout ──
      return (
        <div className="flex h-full">
          <Sidebar
            project={project}
            threads={threads}
            currentThreadId={currentId}
            onSelectThread={selectThread}
            onNewThread={startNewThread}
            onDeleteThread={deleteThread}
            onChangeProject={() => { setProject(null); }}
            loading={threadsLoading}
          />

          <div className="flex-1 flex flex-col min-w-0">
            {/* Error banner */}
            {error && (
              <div className="flex-shrink-0 px-6 py-3 bg-red-50 border-b border-red-200 flex items-center gap-3">
                <span className="text-red-500 font-bold text-sm">⚠</span>
                <p className="flex-1 text-red-700 text-sm">{error}</p>
                <button onClick={() => setError("")} className="text-red-400 hover:text-red-600 text-xs font-bold transition-colors">✕</button>
              </div>
            )}

            <ChatView
              thread={currentThread}
              pendingQuery={pendingQuery}
              streamingText={streamingText}
              onSend={sendQuery}
              loading={loading}
              project={project}
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
